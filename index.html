<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nurya.ai</title>
    <meta name="description" content="nurya builds biophysics-based foundational models of the brain for therapeutic target discovery in mental health disorders.">
    <meta property="og:title" content="nurya">
    <meta property="og:description" content="nurya builds biophysics-based foundational models of the brain for therapeutic target discovery in mental health disorders.">
    <meta property="og:image" content="https://nurya.ai/images/hero.jpg">
    <meta property="og:url" content="https://nurya.ai">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
        }

        /* Hero background */
        .background {
            position: fixed;
            inset: 0;
            background: url('images/hero.jpg') center/cover no-repeat;
            z-index: 0;
        }

        /* Dark overlay for text readability */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1;
        }

        /* Main content */
        .content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 2rem;
        }

        .company-name {
            font-size: 56px;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 52px;
        }

        .coming-soon {
            font-size: 22px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .company-name {
                font-size: 36px;
                letter-spacing: 2px;
            }

            .coming-soon {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="overlay"></div>

    <main class="content">
        <h1 class="company-name">nurya.ai</h1>
        <p class="coming-soon">coming soon</p>
    </main>
</body>
</html>
